version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pga-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    networks:
      - pga-network
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pga-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pga-network

networks:
  pga-network:
    driver: bridge